name: Test CNSVintraday

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Run tests
        run: pytest -q --cov=cnsvintraday --cov-report=term-missing --cov-fail-under=80
      - name: Feature engine smoke
        run: python -m cnsvintraday.features.feature_store --help
      - name: Model validation smoke
        run: python -m cnsvintraday.models.baseline_pipeline --help
      - name: Path validation smoke
        run: python -m cnsvintraday.paths.path_replay --help
      - name: Learning validation smoke
        run: python -m cnsvintraday.learning.build_learning --help
